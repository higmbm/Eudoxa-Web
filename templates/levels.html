<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Levels for aspect: {{ aspect_name }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles/common.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles/levels.css') }}">
  <script src="{{ url_for('static', filename='common.js') }}"></script>
  <script src="{{ url_for('static', filename='nav.js') }}" defer></script>
</head>
<body>

  <h1>Levels for aspect: {{ aspect_name }}</h1>

  <main class="container">
    <table class="data-table narrow">
      <thead>
        <tr>
          <th>Level</th>
          <th>Description</th>
        </tr>
      </thead>
      <tbody>
        {% for row in rows %}
        <tr>
          <td>{{ row.level }}</td>
          <td>{{ row.description }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>

  </main>

</body>
</html>
