<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Aspects</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles/common.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles/aspects.css') }}">
</head>
<body>

  <h1>Aspects</h1>

  <p class="back-link"><a href="/testpanel">&larr; Back to test panel</a></p>

  <table class="data-table aspects-table">
    <thead>
      <tr>
        <th>Name</th>
        <th>Data type</th>
        <th>Description</th>
        <th>Levels</th>
        <th>#Δ</th>
      </tr>
    </thead>
    <tbody>
      {% for row in rows %}
      <tr>
        <td>{{ row.name }}</td>
        <td>{{ row.dtype }}</td>
        <td>{{ row.description }}</td>
        <td><a href="/aspects/{{ row.name }}/levels">View</a></td>
        <td>{{ row.vdiffs }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>

</body>
</html>
