<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <title>Aspekter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles/common.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles/aspects.css') }}">
</head>
<body>

  <h1>Aspekter</h1>

  <p class="back-link"><a href="/testpanel">&larr; Tillbaka till testpanelen</a></p>

  <table class="data-table aspects-table">
    <thead>
      <tr>
        <th>Namn</th>
        <th>Datatyp</th>
        <th>Beskrivning</th>
        <th>Nivåer</th>
        <th>#Δ</th>
      </tr>
    </thead>
    <tbody>
      {% for row in rows %}
      <tr>
        <td>{{ row.name }}</td>
        <td>{{ row.dtype }}</td>
        <td>{{ row.description }}</td>
        <td><a href="/aspects/{{ row.name }}/levels">Visa</a></td>
        <td>{{ row.vdiffs }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>

</body>
</html>
